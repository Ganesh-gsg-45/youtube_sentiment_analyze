<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — SentimentScope</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=2">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        bg: '#07071a',
                        brand: '#6366f1',
                        brand2: '#8b5cf6',
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-slate-50 dark:bg-bg text-slate-900 dark:text-white min-h-screen font-['Inter'] antialiased flex items-center justify-center transition-colors duration-300">

    <!-- Theme Toggle -->
    <div class="absolute top-6 right-6 z-50">
        <button id="themeToggleBtn"
            class="px-3 py-2 bg-slate-200 dark:bg-white/5 border border-slate-300 dark:border-white/10 rounded-lg text-sm font-semibold text-slate-600 dark:text-slate-400 hover:bg-slate-300 dark:hover:bg-white/10 transition-all">
            <i class="fas fa-sun block dark:hidden"></i>
            <i class="fas fa-moon hidden dark:block"></i>
        </button>
    </div>

    <!-- Background orbs -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="relative z-10 w-full max-w-md px-6">
        <div class="text-center mb-10 animate-fade-in">
            <div class="flex items-center justify-center gap-3 mb-4">
                <i
                    class="fab fa-youtube text-3xl bg-gradient-to-br from-red-500 to-pink-500 bg-clip-text text-transparent"></i>
                <h1
                    class="text-3xl font-black tracking-tight bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 bg-clip-text text-transparent">
                    SentimentScope
                </h1>
            </div>
            <p class="text-slate-400">Create your account or continue with Google</p>
        </div>

        <div class="glass-card p-8 animate-slide-up">
            <form id="signupForm" class="space-y-6">
                <div>
                    <label for="email" class="block text-sm font-semibold text-slate-400 mb-2">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="name@company.com"
                        class="w-full px-5 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-brand focus:ring-2 focus:ring-brand/20 transition-all"
                        required autocomplete="email">
                </div>
                <div>
                    <label for="password" class="block text-sm font-semibold text-slate-400 mb-2">Password</label>
                    <input type="password" id="password" name="password" placeholder="At least 6 characters"
                        class="w-full px-5 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-brand focus:ring-2 focus:ring-brand/20 transition-all"
                        required minlength="6" autocomplete="new-password">
                </div>
                <div>
                    <label for="confirm-password" class="block text-sm font-semibold text-slate-400 mb-2">Confirm
                        Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="••••••••"
                        class="w-full px-5 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-brand focus:ring-2 focus:ring-brand/20 transition-all"
                        required minlength="6" autocomplete="new-password">
                </div>
                <button type="submit"
                    class="w-full py-4 bg-gradient-to-r from-brand to-brand2 text-white font-bold rounded-xl hover:opacity-90 hover:scale-[1.02] transition-all shadow-lg shadow-brand/25">
                    Create Account
                </button>
            </form>

            <div class="divider">or</div>

            <button type="button" id="googleSignupBtn" class="google-btn">
                <i class="fab fa-google"></i> Continue with Google
            </button>

            <button type="button" id="githubSignupBtn"
                style="width:100%; display:flex; align-items:center; justify-content:center; gap:10px; padding:13px 20px; margin-top:10px; background:#24292e; border:1px solid rgba(255,255,255,0.12); border-radius:12px; color:#fff; font-size:0.95rem; font-weight:600; cursor:pointer; transition:all 0.25s; box-shadow:0 2px 8px rgba(0,0,0,0.3);"
                onmouseover="this.style.background='#2f363d'; this.style.transform='scale(1.02)';"
                onmouseout="this.style.background='#24292e'; this.style.transform='scale(1)';"
            >
                <i class="fab fa-github" style="font-size:1.1rem;"></i> Continue with GitHub
            </button>

            <div class="mt-8 pt-6 border-t border-white/10 text-center">
                <p class="text-sm text-slate-400">
                    Already have an account?
                    <a href="/login" class="text-brand font-bold hover:text-brand2 transition-colors ml-1">Sign In</a>
                </p>
            </div>
        </div>

        <footer class="text-center mt-10 text-slate-600 text-xs">
            <p>&copy; 2024 SentimentScope AI. Secure Authentication via Firebase.</p>
        </footer>
    </div>

    <script type="module">
        import { auth } from "{{ url_for('static', filename='js/firebase.js') }}?v=6";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { signupUser, googleLogin, githubLogin } from "{{ url_for('static', filename='js/auth.js') }}?v=6";

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = '/';
            }
        });

        const authMessage = document.createElement('div');
        authMessage.id = 'authMessage';
        authMessage.className = 'hidden mt-4 rounded-lg border border-rose-500/30 bg-rose-500/10 px-4 py-3 text-sm text-rose-300';
        document.getElementById('signupForm').appendChild(authMessage);

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            authMessage.classList.add('hidden');
            authMessage.textContent = '';

            if (password !== confirmPassword) {
                authMessage.textContent = 'Passwords do not match.';
                authMessage.classList.remove('hidden');
                return;
            }

            try {
                await signupUser(email, password);
                window.location.href = '/';
            } catch (err) {
                console.error('Signup Error:', err);
                authMessage.textContent = err?.message || 'Signup failed. Please try again.';
                authMessage.classList.remove('hidden');
            }
        });

        document.getElementById('googleSignupBtn').addEventListener('click', async () => {
            try {
                await googleLogin();
                window.location.href = '/';
            } catch (err) {
                console.error('Google Signup Error:', err);
                authMessage.textContent = err?.message || 'Google sign-in failed.';
                authMessage.classList.remove('hidden');
            }
        });

        document.getElementById('githubSignupBtn').addEventListener('click', async () => {
            try {
                await githubLogin();
                window.location.href = '/';
            } catch (err) {
                console.error('GitHub Signup Error:', err);
                authMessage.textContent = err?.message || 'GitHub sign-in failed. Make sure GitHub is enabled in Firebase.';
                authMessage.classList.remove('hidden');
            }
        });

        const themeToggleBtn = document.getElementById('themeToggleBtn');
        const htmlElement = document.documentElement;

        if (localStorage.getItem('theme') === 'light') {
            htmlElement.classList.remove('dark');
        } else {
            htmlElement.classList.add('dark');
        }

        themeToggleBtn.addEventListener('click', () => {
            htmlElement.classList.toggle('dark');
            if (htmlElement.classList.contains('dark')) {
                localStorage.setItem('theme', 'dark');
            } else {
                localStorage.setItem('theme', 'light');
            }
        });
    </script>
</body>

</html>
