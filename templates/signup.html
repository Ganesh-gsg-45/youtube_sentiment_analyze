<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Sign Up — SentimentScope</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=3">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        bg: '#07071a',
                        brand: '#6366f1',
                        brand2: '#8b5cf6',
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-slate-50 dark:bg-bg text-slate-900 dark:text-white min-h-screen font-['Inter'] antialiased flex items-center justify-center transition-colors duration-300">

    <!-- Theme Toggle -->
    <div class="absolute top-6 right-6 z-50">
        <button id="themeToggleBtn"
            class="px-3 py-2 bg-slate-200 dark:bg-white/5 border border-slate-300 dark:border-white/10 rounded-lg text-sm font-semibold text-slate-600 dark:text-slate-400 hover:bg-slate-300 dark:hover:bg-white/10 transition-all">
            <i class="fas fa-sun block dark:hidden"></i>
            <i class="fas fa-moon hidden dark:block"></i>
        </button>
    </div>

    <!-- Background orbs -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="relative z-10 w-full max-w-md px-6">
        <div class="text-center mb-10 animate-fade-in">
            <div class="flex items-center justify-center gap-3 mb-4">
                <i
                    class="fab fa-youtube text-3xl bg-gradient-to-br from-red-500 to-pink-500 bg-clip-text text-transparent"></i>
                <h1
                    class="text-3xl font-black tracking-tight bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 bg-clip-text text-transparent">
                    SentimentScope
                </h1>
            </div>
            <p class="text-slate-400">Create your account or continue with Google</p>
        </div>

        <div class="glass-card p-8 animate-slide-up">
            <form id="signupForm" action="/signup" method="POST" class="space-y-6">
                <div>
                    <label for="email" class="block text-sm font-semibold text-slate-400 mb-2">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="name@company.com"
                        class="w-full px-5 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-brand focus:ring-2 focus:ring-brand/20 transition-all"
                        required autocomplete="email">
                </div>
                <div>
                    <label for="password" class="block text-sm font-semibold text-slate-400 mb-2">Password</label>
                    <input type="password" id="password" name="password" placeholder="At least 6 characters"
                        class="w-full px-5 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-brand focus:ring-2 focus:ring-brand/20 transition-all"
                        required minlength="6" autocomplete="new-password">
                </div>
                <div>
                    <label for="confirm-password" class="block text-sm font-semibold text-slate-400 mb-2">Confirm
                        Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="••••••••"
                        class="w-full px-5 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-brand focus:ring-2 focus:ring-brand/20 transition-all"
                        required minlength="6" autocomplete="new-password">
                </div>
                <button type="submit"
                    class="w-full py-4 bg-white/10 dark:bg-white/5 border border-slate-300 dark:border-white/10 text-slate-700 dark:text-white font-semibold rounded-xl hover:bg-white/20 dark:hover:bg-white/10 hover:scale-[1.01] transition-all">
                    Create Account
                </button>
            </form>

            <div class="divider">or</div>

            <button type="button" id="googleSignupBtn"
                style="width:100%; display:flex; align-items:center; justify-content:center; gap:12px; padding:16px 20px; background:linear-gradient(90deg, var(--brand, #6366f1), var(--brand2, #a855f7)); border:none; border-radius:12px; color:#fff; font-size:1.05rem; font-weight:700; cursor:pointer; transition:all 0.25s; box-shadow:0 4px 16px rgba(99,102,241,0.35);"
                onmouseover="this.style.transform='scale(1.02)'; this.style.boxShadow='0 6px 20px rgba(99,102,241,0.45)';"
                onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='0 4px 16px rgba(99,102,241,0.35)';"
            >
                <svg width="22" height="22" viewBox="0 0 48 48" style="flex-shrink:0;">
                    <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l6-6C34.6 5.1 29.6 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21 21-9.4 21-21c0-1.2-.1-2.4-.4-3.5z"/>
                    <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.9 18.9 13 24 13c3.1 0 5.8 1.1 8 3l6-6C34.6 5.1 29.6 3 24 3c-7.4 0-13.8 4.1-17.7 10.1z"/>
                    <path fill="#4CAF50" d="M24 45c5.5 0 10.4-1.9 14.2-5.1l-6.6-5.4c-2 1.4-4.6 2.2-7.6 2.2-5.2 0-9.6-3.3-11.3-8l-6.6 5.1C9.9 40.7 16.4 45 24 45z"/>
                    <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.2 4.2-4.1 5.6l6.6 5.4C41.9 35.9 45 30.5 45 24c0-1.2-.1-2.4-.4-3.5z"/>
                </svg>
                Continue with Google
            </button>

            <div class="mt-8 pt-6 border-t border-white/10 text-center">
                <p class="text-sm text-slate-400">
                    Already have an account?
                    <a href="/login" class="text-brand font-bold hover:text-brand2 transition-colors ml-1">Sign In</a>
                </p>
            </div>
        </div>

        <footer class="text-center mt-10 text-slate-600 text-xs">
            <p>&copy; 2024 SentimentScope AI. Secure Authentication via Firebase.</p>
        </footer>
    </div>

    <script type="module">
        import { auth } from "{{ url_for('static', filename='js/firebase.js') }}?v=8";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { signupUser, googleLogin, setSessionCookie } from "{{ url_for('static', filename='js/auth.js') }}?v=9";

        const authMessage = document.createElement('div');
        authMessage.id = 'authMessage';
        authMessage.className = 'hidden mt-4 rounded-lg border border-rose-500/30 bg-rose-500/10 px-4 py-3 text-sm text-rose-300';
        document.getElementById('signupForm').appendChild(authMessage);

        function showError(msg) {
            authMessage.textContent = msg;
            authMessage.classList.remove('hidden');
        }
        function hideError() {
            authMessage.textContent = '';
            authMessage.classList.add('hidden');
        }

        // ---- If already logged in, go to dashboard ----
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                await setSessionCookie(user);
                window.location.href = '/';
            }
        });

        // ---- Email/Password Signup ----
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password !== confirmPassword) {
                showError('Passwords do not match.');
                return;
            }

            try {
                await signupUser(email, password);
                window.location.href = '/';
            } catch (err) {
                console.error('Signup Error:', err);
                let msg = 'Signup failed. Please try again.';
                if (err?.code === 'auth/email-already-in-use') msg = 'An account with this email already exists.';
                else if (err?.code === 'auth/weak-password') msg = 'Password must be at least 6 characters.';
                else if (err?.message) msg = err.message;
                showError(msg);
            }
        });

        // ---- Google OAuth (popup) ----
        document.getElementById('googleSignupBtn').addEventListener('click', async (e) => {
            hideError();
            const btn = e.currentTarget;
            btn.disabled = true;
            try {
                await googleLogin();
                window.location.href = '/';
            } catch (err) {
                console.error('Google Signup Error:', err?.code, err?.message);
                if (err?.code === 'auth/popup-closed-by-user') {
                    // no-op
                } else if (err?.code === 'auth/popup-blocked') {
                    showError('Your browser blocked the sign-in popup. Please allow popups for this site and try again.');
                } else {
                    showError(err?.message || 'Google sign-in failed. Please try again.');
                }
            } finally {
                btn.disabled = false;
            }
        });

        // ---- Theme Toggle ----
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        const htmlElement = document.documentElement;

        function applySignupTheme(theme) {
            if (theme === 'light') {
                htmlElement.classList.remove('dark');
                document.body.style.background = '#f1f5f9';
            } else {
                htmlElement.classList.add('dark');
                document.body.style.background = '#07071a';
            }
        }

        applySignupTheme(localStorage.getItem('theme') || 'dark');

        themeToggleBtn.addEventListener('click', () => {
            const newTheme = htmlElement.classList.contains('dark') ? 'light' : 'dark';
            localStorage.setItem('theme', newTheme);
            applySignupTheme(newTheme);
        });
    </script>
</body>

</html>
