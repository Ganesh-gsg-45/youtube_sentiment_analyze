<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Login — SentimentScope</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=3">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        bg: '#07071a',
                        brand: '#6366f1',
                        brand2: '#8b5cf6',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-100 dark:bg-bg text-slate-900 dark:text-white min-h-screen font-['Inter'] antialiased flex items-center justify-center transition-colors duration-300">

    <!-- ===== THEME TOGGLE ===== -->
    <div style="position:fixed; top:20px; right:20px; z-index:9999;">
        <button id="themeToggleBtn"
            style="background: linear-gradient(135deg,#6366f1,#8b5cf6); border:none; border-radius:10px; padding:9px 16px; cursor:pointer; display:flex; align-items:center; gap:8px; font-size:0.85rem; font-weight:700; color:white; box-shadow:0 0 16px rgba(99,102,241,0.5); transition:all 0.3s;">
            <span id="themeIcon">🌙</span>
            <span id="themeLabel">Dark</span>
        </button>
    </div>

    <!-- Background orbs -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="relative z-10 w-full max-w-md px-6">
        <div class="text-center mb-10 animate-fade-in">
            <div class="flex items-center justify-center gap-3 mb-4">
                <i class="fab fa-youtube text-3xl bg-gradient-to-br from-red-500 to-pink-500 bg-clip-text text-transparent"></i>
                <h1 class="text-3xl font-black tracking-tight bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 bg-clip-text text-transparent">
                    SentimentScope
                </h1>
            </div>
            <p class="text-slate-500 dark:text-slate-400">Welcome back! Please login to your account.</p>
        </div>

        <div class="glass-card p-8 animate-slide-up">
<form id="loginForm" method="POST" action="/login" class="space-y-6">

                <div>
                    <label for="email" class="block text-sm font-semibold text-slate-500 dark:text-slate-400 mb-2">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="name@company.com"
                        class="w-full px-5 py-3 bg-white dark:bg-white/5 border border-slate-300 dark:border-white/10 rounded-xl text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:border-brand focus:ring-2 focus:ring-brand/20 transition-all"
                        required autocomplete="email">
                </div>
                <div>
                    <div class="flex justify-between mb-2">
                        <label for="password" class="block text-sm font-semibold text-slate-500 dark:text-slate-400">Password</label>
                        <a href="#" class="text-xs text-brand hover:text-brand2 transition-colors">Forgot password?</a>
                    </div>
                    <input type="password" id="password" name="password" placeholder="••••••••"
                        class="w-full px-5 py-3 bg-white dark:bg-white/5 border border-slate-300 dark:border-white/10 rounded-xl text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:border-brand focus:ring-2 focus:ring-brand/20 transition-all"
                        required autocomplete="current-password">
                </div>
                <button type="submit" class="w-full py-4 bg-gradient-to-r from-brand to-brand2 text-white font-bold rounded-xl hover:opacity-90 hover:scale-[1.02] transition-all shadow-lg shadow-brand/25">
                    Sign In
                </button>
            </form>

            <div class="divider">or</div>

            <button type="button" id="googleLoginBtn" class="google-btn">
                <i class="fab fa-google"></i> Continue with Google
            </button>

            <div class="mt-8 pt-6 border-t border-slate-200 dark:border-white/10 text-center">
                <p class="text-sm text-slate-500 dark:text-slate-400">
                    Don't have an account?
                    <a href="/signup" class="text-brand font-bold hover:text-brand2 transition-colors ml-1">Create Account</a>
                </p>
            </div>
        </div>

        <footer class="text-center mt-10 text-slate-400 text-xs">
            <p>&copy; 2024 SentimentScope AI. Secure Authentication via Firebase.</p>
        </footer>
    </div>

    <script type="module">
        import { loginUser, googleLogin } from "{{ url_for('static', filename='js/auth.js') }}";

document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const email = formData.get('email');
            const password = formData.get('password');
            try {
                await loginUser(email, password);
            } catch (err) {
                console.log('Firebase failed, submitting form:', err);
                e.target.submit(); // Fallback to server POST
            }
        });

        document.getElementById('googleLoginBtn').addEventListener('click', async () => {
            await googleLogin();
        });

        // ===== THEME TOGGLE =====
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        const themeIcon = document.getElementById('themeIcon');
        const themeLabel = document.getElementById('themeLabel');
        const htmlEl = document.documentElement;

        function applyTheme(theme) {
            if (theme === 'light') {
                htmlEl.classList.remove('dark');
                themeIcon.innerHTML = '☀️';
                themeLabel.textContent = 'Light';
                document.body.style.background = '#f1f5f9';
            } else {
                htmlEl.classList.add('dark');
                themeIcon.innerHTML = '🌙';
                themeLabel.textContent = 'Dark';
                document.body.style.background = '#07071a';
            }
        }

        applyTheme(localStorage.getItem('theme') || 'dark');

        themeToggleBtn.addEventListener('click', () => {
            const newTheme = htmlEl.classList.contains('dark') ? 'light' : 'dark';
            localStorage.setItem('theme', newTheme);
            applyTheme(newTheme);
        });
    </script>
</body>
</html>
