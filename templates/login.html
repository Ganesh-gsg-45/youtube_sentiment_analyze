<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Login — SentimentScope</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=3">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        bg: '#07071a',
                        brand: '#6366f1',
                        brand2: '#8b5cf6',
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-slate-100 dark:bg-bg text-slate-900 dark:text-white min-h-screen font-['Inter'] antialiased flex items-center justify-center transition-colors duration-300">

    <!-- ===== THEME TOGGLE ===== -->
    <div style="position:fixed; top:20px; right:20px; z-index:9999;">
        <button id="themeToggleBtn"
            style="background: linear-gradient(135deg,#6366f1,#8b5cf6); border:none; border-radius:10px; padding:9px 16px; cursor:pointer; display:flex; align-items:center; gap:8px; font-size:0.85rem; font-weight:700; color:white; box-shadow:0 0 16px rgba(99,102,241,0.5); transition:all 0.3s;">
            <span id="themeIcon">🌙</span>
            <span id="themeLabel">Dark</span>
        </button>
    </div>

    <!-- Background orbs -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="relative z-10 w-full max-w-md px-6">
        <div class="text-center mb-10 animate-fade-in">
            <div class="flex items-center justify-center gap-3 mb-4">
                <i
                    class="fab fa-youtube text-3xl bg-gradient-to-br from-red-500 to-pink-500 bg-clip-text text-transparent"></i>
                <h1
                    class="text-3xl font-black tracking-tight bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 bg-clip-text text-transparent">
                    SentimentScope
                </h1>
            </div>
            <p class="text-slate-500 dark:text-slate-400">Welcome back! Please login to your account.</p>
        </div>

        <div class="glass-card p-8 animate-slide-up">
            <form id="loginForm" method="POST" action="/login" class="space-y-6">

                <div>
                    <label for="email" class="block text-sm font-semibold text-slate-500 dark:text-slate-400 mb-2">Email
                        Address</label>
                    <input type="email" id="email" name="email" placeholder="name@company.com"
                        class="w-full px-5 py-3 bg-white dark:bg-white/5 border border-slate-300 dark:border-white/10 rounded-xl text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:border-brand focus:ring-2 focus:ring-brand/20 transition-all"
                        required autocomplete="email">
                </div>
                <div>
                    <div class="flex justify-between mb-2">
                        <label for="password"
                            class="block text-sm font-semibold text-slate-500 dark:text-slate-400">Password</label>
                        <a href="#" class="text-xs text-brand hover:text-brand2 transition-colors">Forgot password?</a>
                    </div>
                    <input type="password" id="password" name="password" placeholder="••••••••"
                        class="w-full px-5 py-3 bg-white dark:bg-white/5 border border-slate-300 dark:border-white/10 rounded-xl text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:border-brand focus:ring-2 focus:ring-brand/20 transition-all"
                        required autocomplete="current-password">
                </div>
                <button type="submit"
                    class="w-full py-4 bg-white/10 dark:bg-white/5 border border-slate-300 dark:border-white/10 text-slate-700 dark:text-white font-semibold rounded-xl hover:bg-white/20 dark:hover:bg-white/10 hover:scale-[1.01] transition-all">
                    Sign In
                </button>
            </form>

            <div class="divider">or</div>

            <button type="button" id="googleLoginBtn"
                style="width:100%; display:flex; align-items:center; justify-content:center; gap:12px; padding:16px 20px; background:linear-gradient(90deg, var(--brand, #6366f1), var(--brand2, #a855f7)); border:none; border-radius:12px; color:#fff; font-size:1.05rem; font-weight:700; cursor:pointer; transition:all 0.25s; box-shadow:0 4px 16px rgba(99,102,241,0.35);"
                onmouseover="this.style.transform='scale(1.02)'; this.style.boxShadow='0 6px 20px rgba(99,102,241,0.45)';"
                onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='0 4px 16px rgba(99,102,241,0.35)';"
            >
                <svg width="22" height="22" viewBox="0 0 48 48" style="flex-shrink:0;">
                    <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l6-6C34.6 5.1 29.6 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21 21-9.4 21-21c0-1.2-.1-2.4-.4-3.5z"/>
                    <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.9 18.9 13 24 13c3.1 0 5.8 1.1 8 3l6-6C34.6 5.1 29.6 3 24 3c-7.4 0-13.8 4.1-17.7 10.1z"/>
                    <path fill="#4CAF50" d="M24 45c5.5 0 10.4-1.9 14.2-5.1l-6.6-5.4c-2 1.4-4.6 2.2-7.6 2.2-5.2 0-9.6-3.3-11.3-8l-6.6 5.1C9.9 40.7 16.4 45 24 45z"/>
                    <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.2 4.2-4.1 5.6l6.6 5.4C41.9 35.9 45 30.5 45 24c0-1.2-.1-2.4-.4-3.5z"/>
                </svg>
                Continue with Google
            </button>

            <div class="mt-8 pt-6 border-t border-slate-200 dark:border-white/10 text-center">
                <p class="text-sm text-slate-500 dark:text-slate-400">
                    Don't have an account?
                    <a href="/signup" class="text-brand font-bold hover:text-brand2 transition-colors ml-1">Create
                        Account</a>
                </p>
            </div>
        </div>

        <footer class="text-center mt-10 text-slate-400 text-xs">
            <p>&copy; 2024 SentimentScope AI. Secure Authentication via Firebase.</p>
        </footer>
    </div>

    <script type="module">
        import { auth } from "{{ url_for('static', filename='js/firebase.js') }}?v=8";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { loginUser, googleLogin, setSessionCookie } from "{{ url_for('static', filename='js/auth.js') }}?v=9";

        // ---- Error message element ----
        const authMessage = document.createElement('div');
        authMessage.id = 'authMessage';
        authMessage.className = 'hidden mt-4 rounded-lg border border-rose-500/30 bg-rose-500/10 px-4 py-3 text-sm text-rose-300';
        document.getElementById('loginForm').appendChild(authMessage);

        function showError(msg) {
            authMessage.textContent = msg;
            authMessage.classList.remove('hidden');
        }
        function hideError() {
            authMessage.textContent = '';
            authMessage.classList.add('hidden');
        }

        // ---- If already logged in (valid session), go straight to dashboard ----
        // Also re-syncs the cookie in case it expired but the Firebase session is still alive.
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                await setSessionCookie(user);
                window.location.href = '/';
            }
        });

        // ---- Email/Password Login ----
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();
            const formData = new FormData(e.target);
            const email = formData.get('email');
            const password = formData.get('password');
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';
            try {
                await loginUser(email, password);
                window.location.href = '/';
            } catch (err) {
                console.error('Login Error:', err);
                let msg = 'Login failed. Please check your credentials.';
                if (err?.code === 'auth/user-not-found') msg = 'No account found with this email.';
                else if (err?.code === 'auth/wrong-password' || err?.code === 'auth/invalid-credential') msg = 'Incorrect email or password.';
                else if (err?.code === 'auth/too-many-requests') msg = 'Too many failed attempts. Try again later.';
                else if (err?.message) msg = err.message;
                showError(msg);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
            }
        });

        // ---- Google OAuth (popup) ----
        document.getElementById('googleLoginBtn').addEventListener('click', async (e) => {
            hideError();
            const btn = e.currentTarget;
            btn.disabled = true;
            try {
                await googleLogin();
                window.location.href = '/';
            } catch (err) {
                console.error('Google Login Error:', err?.code, err?.message);
                if (err?.code === 'auth/popup-closed-by-user') {
                    // User closed the popup — not a real error, just reset silently.
                } else if (err?.code === 'auth/popup-blocked') {
                    showError('Your browser blocked the sign-in popup. Please allow popups for this site and try again.');
                } else {
                    showError(err?.message || 'Google sign-in failed. Please try again.');
                }
            } finally {
                btn.disabled = false;
            }
        });

        // ===== THEME TOGGLE =====
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        const themeIcon = document.getElementById('themeIcon');
        const themeLabel = document.getElementById('themeLabel');
        const htmlEl = document.documentElement;

        function applyTheme(theme) {
            if (theme === 'light') {
                htmlEl.classList.remove('dark');
                themeIcon.innerHTML = '☀️';
                themeLabel.textContent = 'Light';
                document.body.style.background = '#f1f5f9';
            } else {
                htmlEl.classList.add('dark');
                themeIcon.innerHTML = '🌙';
                themeLabel.textContent = 'Dark';
                document.body.style.background = '#07071a';
            }
        }

        applyTheme(localStorage.getItem('theme') || 'dark');

        themeToggleBtn.addEventListener('click', () => {
            const newTheme = htmlEl.classList.contains('dark') ? 'light' : 'dark';
            localStorage.setItem('theme', newTheme);
            applyTheme(newTheme);
        });
    </script>
</body>

</html>
